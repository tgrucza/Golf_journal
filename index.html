  { number: 12, par: 3, yards: 213, handicap: 15 },
  { number: 13, par: 4, yards: 440, handicap: 1 },

const TEE_OPTIONS = [

  { key: 'fairway', label: 'Fairway', color: C.hit },

  { key: 'short', label: 'Short of Pin', color: C.miss },
  { key: 'pinhigh', label: 'Pin High', color: C.hit },
  { key: 'long', label: 'Long of Pin', color: C.miss },
  { key: 'holed', label: 'Holed It', color: C.hit },
];
const FIRST_PUTT_OPTIONS = [
  { key: 'short', label: 'Short', color: C.miss },
  { key: 'holed', label: 'Holed', color: C.hit },
  { key: 'long', label: 'Long', color: C.miss },

];

// ---------- storage helpers ----------
function uid() { return 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

const STORAGE_PREFIX = 'buckhorn-golf-journal:';
async function storageGet(key) {
  try {
    const raw = window.localStorage.getItem(STORAGE_PREFIX + key);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
async function storageSet(key, value) {
  try { window.localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value)); }
  catch (e) { console.error('storage set failed', key, e); }
}
async function storageDelete(key) {
  try { window.localStorage.removeItem(STORAGE_PREFIX + key); } catch (e) { /* ignore */ }
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}
function toParStr(n) {
  if (n === 0) return 'E';
  return n > 0 ? `+${n}` : `${n}`;
}
function roundPar(round, holesConfig) {
  return Object.keys((round && round.holes) || {}).reduce((sum, num) => {
    const cfg = holesConfig.find(h => String(h.number) === String(num));
    return sum + (cfg ? cfg.par : 0);
  }, 0);
}

// ---------- small UI atoms ----------
function BigButton({ children, onClick, tone = 'pine', style, disabled }) {
  const tones = {
    pine: { bg: C.pine, fg: '#fff' },
    ghost: { bg: '#fff', fg: C.pine, border: `2px solid ${C.pine}` },
    danger: { bg: '#fff', fg: C.miss, border: `2px solid ${C.miss}` },
  };
  const t = tones[tone];
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        background: t.bg, color: t.fg, border: t.border || 'none',
        borderRadius: 16, padding: '18px 20px', fontSize: 18, fontWeight: 700,
        fontFamily: 'Inter, sans-serif', width: '100%', display: 'flex',
        alignItems: 'center', justifyContent: 'center', gap: 10,
        opacity: disabled ? 0.5 : 1, boxShadow: tone === 'pine' ? '0 4px 14px rgba(31,75,63,0.25)' : 'none',
        ...style,
      }}
    >
      {children}
    </button>
  );
}

function TroubleRow({ value, onChange, options = TROUBLE_OPTIONS }) {
  return (
    <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
      {options.map(opt => {
        const selected = value === opt.key;
        return (
          <button
            key={opt.key}
            onClick={() => onChange(selected ? null : opt.key)}
            style={{
              flex: 1, padding: '6px 4px', borderRadius: 8, fontSize: 11, fontWeight: 700,
              fontFamily: 'Inter, sans-serif', border: `1.5px dashed ${opt.color}`,
              background: selected ? opt.color : '#fff',
              color: selected ? '#fff' : opt.color,
            }}
          >
            {opt.label}
          </button>
        );
      })}
    </div>
  );
}

function TogglePill({ active, onChange, label }) {
  return (
    <button
      onClick={() => onChange(!active)}
      style={{
        width: '100%', padding: '9px', borderRadius: 10, fontSize: 12, fontWeight: 700,
        fontFamily: 'Inter, sans-serif', border: `2px solid ${C.neutral}`,
        background: active ? C.neutral : '#fff', color: active ? '#fff' : C.neutral,
        marginBottom: 8,
      }}
    >
      {active ? '✓ ' : ''}{label}
    </button>
  );
}

function OptionGrid({ options, value, onChange, columns = 3 }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: `repeat(${columns}, 1fr)`, gap: 6 }}>
      {options.map(opt => {
        const selected = value === opt.key;
        return (
          <button
            key={opt.key}
            onClick={() => onChange(opt.key)}
            style={{
              padding: '9px 6px', borderRadius: 10, fontSize: 12.5, fontWeight: 700,
              fontFamily: 'Inter, sans-serif', border: `2px solid ${opt.color}`,
              background: selected ? opt.color : '#fff',
              color: selected ? '#fff' : opt.color,
              minHeight: 34, transition: 'all .12s ease',
            }}
          >
            {opt.label}
          </button>
        );
      })}
    </div>
  );
}

function TargetCell({ opt, value, onChange, area }) {
  const selected = value === opt.key;
  return (
    <button
      onClick={() => onChange(opt.key)}
      style={{
        gridArea: area, padding: '9px 4px', borderRadius: 10, fontSize: 11.5, fontWeight: 700,
        fontFamily: 'Inter, sans-serif', border: `2px solid ${opt.color}`,
        background: selected ? opt.color : '#fff',
        color: selected ? '#fff' : opt.color,
        minHeight: 34, transition: 'all .12s ease',
      }}
    >
      {opt.label}
    </button>
  );
}

function ApproachTarget({ options, value, onChange }) {
  const byKey = k => options.find(o => o.key === k);
  return (
    <div
      style={{
        display: 'grid',
        gridTemplateAreas: `". long ." "left green right" ". short ."`,
        gridTemplateColumns: '1fr 1fr 1fr',
        gridTemplateRows: 'auto auto auto',
        gap: 6,
      }}
    >
      <TargetCell opt={byKey('long')} value={value} onChange={onChange} area="long" />
      <TargetCell opt={byKey('left')} value={value} onChange={onChange} area="left" />
      <TargetCell opt={byKey('green')} value={value} onChange={onChange} area="green" />
      <TargetCell opt={byKey('right')} value={value} onChange={onChange} area="right" />
      <TargetCell opt={byKey('short')} value={value} onChange={onChange} area="short" />
    </div>
  );
}

function Stepper({ value, onChange, min = 0, max = 12, label, size = 44 }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
      <button
        onClick={() => onChange(Math.max(min, value - 1))}

      <div style={{ minWidth: 40, textAlign: 'center' }}>
        <div style={{ fontFamily: 'Oswald, sans-serif', fontSize: 26, fontWeight: 600, color: C.ink, lineHeight: 1 }}>{value}</div>
        {label && <div style={{ fontSize: 10, color: C.inkSoft, marginTop: 1 }}>{label}</div>}
      </div>
      <button
        onClick={() => onChange(Math.min(max, value + 1))}
        style={{ width: size, height: size, borderRadius: size / 2, flexShrink: 0, border: `2px solid ${C.pine}`, background: C.pine, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}

}

// ---------- Flag progress strip ----------
function FlagStrip({ holesConfig, completedMap, currentHole, onJump }) {
  return (
    <div style={{ display: 'flex', gap: 5, overflowX: 'auto', padding: '2px 2px 8px' }}>
      {holesConfig.map(h => {
        const done = !!completedMap[h.number];
        const active = h.number === currentHole;
        return (
          <button
            key={h.number}
            onClick={() => onJump(h.number)}
            style={{
              flex: '0 0 auto', width: 26, height: 26, borderRadius: 7,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              background: active ? C.pine : done ? C.hitBg : '#fff',
              border: `1.5px solid ${active ? C.pine : done ? C.hit : C.line}`,
              color: active ? '#fff' : done ? C.hit : C.inkSoft,
              fontSize: 11, fontWeight: 700, fontFamily: 'Inter, sans-serif',
            }}
          >
            {h.number}
          </button>
        );
      })}
    </div>
  );
}

// ---------- Hole Entry ----------
function calcAutoScore(d, par) {
  if (!d.approach) return par;
  let strokes = Math.max(1, par - 2);
  if (d.approach !== 'green') strokes += 1;
  strokes += d.putts || 0;
  if (d.teeTrouble === 'water' || d.teeTrouble === 'ob') strokes += 1;
  if (d.approachTrouble === 'water' || d.approachTrouble === 'ob') strokes += 1;
  return Math.max(1, strokes);
}

function HoleEntry({ hole, initialData, onSaveAndGo, holesTotal }) {
  const isPar3 = hole.par === 3;
  const blank = { teeShot: null, teeTrouble: null, approach: null, approachTrouble: null, shortSided: false, shortGame: null, putts: 0, firstPutt: null, firstPuttBreak: null, score: hole.par };
  const [data, setData] = useState(initialData || blank);
  const [scoreTouched, setScoreTouched] = useState(!!initialData);

  useEffect(() => { setData(initialData || blank); setScoreTouched(!!initialData); }, [hole.number]);

  useEffect(() => {
    setData(prev => {
      if (prev.putts === 1 && (prev.firstPutt !== 'holed' || prev.firstPuttBreak !== null)) return { ...prev, firstPutt: 'holed', firstPuttBreak: null };
      if (prev.putts >= 2 && prev.firstPutt === 'holed') return { ...prev, firstPutt: null };
      if (prev.putts === 0 && (prev.firstPutt !== null || prev.firstPuttBreak !== null)) return { ...prev, firstPutt: null, firstPuttBreak: null };
      return prev;
    });
  }, [data.putts]);

  // Holing the chip/pitch means no putt was needed.
  useEffect(() => {
    if (data.shortGame === 'holed' && data.putts !== 0) {
      setData(prev => ({ ...prev, putts: 0 }));
    }
  }, [data.shortGame]);

  // Auto-suggest the score from the shots logged, until the person manually adjusts it.
  useEffect(() => {
    if (scoreTouched) return;
    const suggested = calcAutoScore(data, hole.par);
    if (suggested !== data.score) setData(prev => ({ ...prev, score: suggested }));
  }, [data.approach, data.putts, data.shortGame, data.teeTrouble, data.approachTrouble, scoreTouched]);

  const missedGreen = data.approach && data.approach !== 'green';
  const set = (k, v) => setData(prev => ({ ...prev, [k]: v }));

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
        <div>
          <div style={{ fontFamily: 'Oswald, sans-serif', fontSize: 24, fontWeight: 600, color: C.ink }}>Hole {hole.number}</div>
          <div style={{ fontSize: 11.5, color: C.inkSoft, fontWeight: 600 }}>Par {hole.par} · {hole.yards} yds · Hcp {hole.handicap}</div>
        </div>
        <Flag size={20} color={C.pine} />
      </div>

      {!isPar3 && (
        <Section title="Off the Tee">
          <OptionGrid options={TEE_OPTIONS} value={data.teeShot} onChange={v => set('teeShot', v)} />
          <TroubleRow value={data.teeTrouble} onChange={v => set('teeTrouble', v)} />
        </Section>
      )}

      <Section title={isPar3 ? 'Off the Tee' : 'Approach Shot'}>
        <ApproachTarget options={APPROACH_OPTIONS} value={data.approach} onChange={v => set('approach', v)} />
        <TroubleRow value={data.approachTrouble} onChange={v => set('approachTrouble', v)} />
      </Section>

      {missedGreen && (
        <Section title="Chip / Pitch">
          <TogglePill active={data.shortSided} onChange={v => set('shortSided', v)} label="Short-Sided" />
          <OptionGrid options={SHORT_GAME_OPTIONS} value={data.shortGame} onChange={v => set('shortGame', v)} columns={2} />
        </Section>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 8 }}>
        <div>
          <div style={SECTION_TITLE_STYLE}>Putts</div>
          {data.shortGame === 'holed' ? (
            <div style={{ background: C.hitBg, borderRadius: 10, padding: '11px 6px', color: C.hit, fontWeight: 700, fontSize: 12, textAlign: 'center' }}>
              Chip-in ⛳<br />0 putts
            </div>
          ) : (
            <Stepper value={data.putts} onChange={v => set('putts', v)} min={0} max={8} />
          )}
        </div>
        <div>
          <div style={SECTION_TITLE_STYLE}>Score</div>
          <Stepper value={data.score} onChange={v => { set('score', v); setScoreTouched(true); }} min={1} max={12} label={toParStr(data.score - hole.par) + ' vs par'} />
        </div>
      </div>

      {data.putts === 1 && (
        <div style={{ background: C.hitBg, borderRadius: 10, padding: '7px', color: C.hit, fontWeight: 700, fontSize: 12, textAlign: 'center', marginBottom: 12 }}>
          One putt — holed ⛳
        </div>
      )}

      {data.putts >= 2 && (
        <Section title="First Putt Finished">
          <OptionGrid options={FIRST_PUTT_OPTIONS.filter(o => o.key !== 'holed')} value={data.firstPutt} onChange={v => set('firstPutt', v)} columns={2} />
          <TroubleRow options={BREAK_OPTIONS} value={data.firstPuttBreak} onChange={v => set('firstPuttBreak', v)} />
        </Section>
      )}

      <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
        {hole.number > 1 && (
          <button
            onClick={() => onSaveAndGo(data, hole.number - 1)}
            style={{ width: 50, borderRadius: 12, border: `2px solid ${C.pine}`, background: '#fff', color: C.pine, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
          ><ChevronLeft size={22} /></button>
        )}
        <BigButton onClick={() => onSaveAndGo(data, hole.number < holesTotal ? hole.number + 1 : 'finish')} style={{ padding: '13px 16px', fontSize: 15 }}>
          {hole.number < holesTotal ? <>Save & Next Hole <ChevronRight size={18} /></> : 'Finish Round'}
        </BigButton>
      </div>
    </div>
  );
}

// ---------- Course Settings ----------
function CourseSettings({ holesConfig, onSave, onBack }) {
  const [local, setLocal] = useState(holesConfig);
  const setPar = (num, delta) => {
    setLocal(prev => prev.map(h => h.number === num ? { ...h, par: Math.min(5, Math.max(3, h.par + delta)) } : h));
  };
  const total = local.reduce((s, h) => s + h.par, 0);
  return (
    <div>
      <TopBar title="Course Setup" onBack={onBack} />
      <p style={{ fontSize: 14, color: C.inkSoft, marginBottom: 16 }}>
        Par is pulled from the official Buckhorn Springs scorecard (Black tees). Adjust here only if you play different tees. Total par: <b style={{ color: C.ink }}>{total}</b>
      </p>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 24 }}>
        {local.map(h => (
          <div key={h.number} style={{ background: C.card, borderRadius: 14, padding: 12, border: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontWeight: 700, color: C.ink }}>Hole {h.number}</div>
              <div style={{ fontSize: 11, color: C.inkSoft }}>{h.yards} yds · Hcp {h.handicap}</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <button onClick={() => setPar(h.number, -1)} style={{ width: 30, height: 30, borderRadius: 15, border: `1px solid ${C.pine}`, background: '#fff', color: C.pine }}>−</button>
              <div style={{ width: 22, textAlign: 'center', fontFamily: 'Oswald, sans-serif', fontSize: 20 }}>{h.par}</div>
              <button onClick={() => setPar(h.number, 1)} style={{ width: 30, height: 30, borderRadius: 15, border: `1px solid ${C.pine}`, background: '#fff', color: C.pine }}>+</button>
            </div>
          </div>
        ))}
      </div>
      <BigButton onClick={() => onSave(local)}>Save Course</BigButton>
    </div>
  );
}

function TopBar({ title, onBack, right }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
      <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: 4, color: C.pine, fontWeight: 700, background: 'none', border: 'none', fontSize: 13 }}>
        <ChevronLeft size={17} /> Back
      </button>
      <div style={{ fontFamily: 'Oswald, sans-serif', fontSize: 16, fontWeight: 600, color: C.ink }}>{title}</div>
      <div style={{ width: 40 }}>{right}</div>
    </div>
  );
}

// ---------- Stats aggregation ----------
function aggregateHoleStats(allRounds, holesConfig) {
  const stats = {};
  holesConfig.forEach(h => {
    stats[h.number] = {
      number: h.number, par: h.par, rounds: 0, totalToPar: 0,
      teeLeft: 0, teeRight: 0, teeFairway: 0, teeCount: 0,
      apShort: 0, apLong: 0, apLeft: 0, apRight: 0, apGreen: 0, apCount: 0,
      teeBunker: 0, teeWater: 0, teeOB: 0, apBunker: 0, apWater: 0, apOB: 0,
      shortSided: 0,
    };
  });
  allRounds.forEach(round => {
    Object.entries(round.holes || {}).forEach(([num, h]) => {
      const s = stats[num];
      if (!s) return;
      if (h.score != null) { s.rounds += 1; s.totalToPar += (h.score - s.par); }
      if (h.teeShot) {
        s.teeCount += 1;
        if (h.teeShot === 'fairway') s.teeFairway += 1;
        else if (h.teeShot === 'left') s.teeLeft += 1;
        else if (h.teeShot === 'right') s.teeRight += 1;
      }
      if (h.teeTrouble === 'bunker') s.teeBunker += 1;
      else if (h.teeTrouble === 'water') s.teeWater += 1;
      else if (h.teeTrouble === 'ob') s.teeOB += 1;
      if (h.approach) {
        s.apCount += 1;
        if (h.approach === 'green') s.apGreen += 1;
        else if (h.approach === 'short') s.apShort += 1;
        else if (h.approach === 'long') s.apLong += 1;
        else if (h.approach === 'left') s.apLeft += 1;
        else if (h.approach === 'right') s.apRight += 1;
      }
      if (h.approachTrouble === 'bunker') s.apBunker += 1;
      else if (h.approachTrouble === 'water') s.apWater += 1;
      else if (h.approachTrouble === 'ob') s.apOB += 1;
      if (h.shortSided) s.shortSided += 1;
    });
  });
  return Object.values(stats).map(s => {
    const misses = [
      { label: 'misses left off the tee', count: s.teeLeft },
      { label: 'misses right off the tee', count: s.teeRight },
      { label: 'finds the fairway bunker', count: s.teeBunker },
      { label: 'finds the water off the tee', count: s.teeWater },
      { label: 'goes O.B. off the tee', count: s.teeOB },
      { label: 'comes up short into the green', count: s.apShort },
      { label: 'goes long into the green', count: s.apLong },
      { label: 'misses left into the green', count: s.apLeft },
      { label: 'misses right into the green', count: s.apRight },
      { label: 'ends up in a greenside bunker', count: s.apBunker },
      { label: 'finds water into the green', count: s.apWater },
      { label: 'goes O.B. into the green', count: s.apOB },
    ].sort((a, b) => b.count - a.count);
    return {
      ...s,
      avgToPar: s.rounds ? s.totalToPar / s.rounds : 0,
      dominantMiss: misses[0].count > 0 ? misses[0] : null,
    };
  });
}

// ---------- Stats View ----------
function StatsView({ roundsIndex, holesConfig, onBack, onDeleteRound }) {
  const [loading, setLoading] = useState(true);
  const [pendingDeleteId, setPendingDeleteId] = useState(null);
  const [allRounds, setAllRounds] = useState([]);

  useEffect(() => { load(); }, [roundsIndex]);
  async function load() {
    setLoading(true);
    const details = await Promise.all(roundsIndex.map(r => storageGet('round-' + r.id)));
    setAllRounds(details.filter(Boolean).sort((a, b) => new Date(a.date) - new Date(b.date)));
    setLoading(false);
  }

  if (loading) {
    return <div style={{ display: 'flex', justifyContent: 'center', padding: 60 }}><Loader2 className="animate-spin" color={C.pine} size={30} /></div>;
  }
  if (allRounds.length === 0) {
    return (
      <div>
        <TopBar title="Journal & Stats" onBack={onBack} />
        <p style={{ color: C.inkSoft, marginTop: 20 }}>No completed rounds yet. Finish a round and it'll show up here.</p>
      </div>
    );
  }

  const scoreTrend = allRounds.map(r => {
    const holesArr = Object.values(r.holes || {});
    const score = holesArr.reduce((s, h) => s + (h.score || 0), 0);
    return { name: fmtDate(r.date), toPar: score - roundPar(r, holesConfig), score };
  });
  const fgTrend = allRounds.map(r => {
    const holesArr = Object.values(r.holes || {});
    const teeHoles = holesArr.filter(h => h.teeShot);
    const fwHit = teeHoles.filter(h => h.teeShot === 'fairway').length;
    const girHit = holesArr.filter(h => h.approach === 'green').length;
    return {
      name: fmtDate(r.date),
      fairwayPct: teeHoles.length ? Math.round((fwHit / teeHoles.length) * 100) : 0,
      girPct: holesArr.length ? Math.round((girHit / holesArr.length) * 100) : 0,
    };
  });
  const puttsTrend = allRounds.map(r => {
    const holesArr = Object.values(r.holes || {});
    const putts = holesArr.reduce((s, h) => s + (h.putts || 0), 0);
    return { name: fmtDate(r.date), putts };
  });
  const penaltyTrend = allRounds.map(r => {
    const holesArr = Object.values(r.holes || {});
    const penalties = holesArr.filter(h => h.teeTrouble === 'water' || h.teeTrouble === 'ob').length
      + holesArr.filter(h => h.approachTrouble === 'water' || h.approachTrouble === 'ob').length;
    return { name: fmtDate(r.date), penalties };
  });

  let scrambleOpps = 0, scrambleMade = 0;
  let ssOpps = 0, ssMade = 0, nonSsOpps = 0, nonSsMade = 0;
  let threePutts = 0, puttsLogged = 0;
  let sandOpps = 0, sandMade = 0;
  let highMiss = 0, lowMiss = 0;
  allRounds.forEach(r => {
    Object.entries(r.holes || {}).forEach(([num, h]) => {
      const holeCfg = holesConfig.find(c => String(c.number) === String(num));
      if (!holeCfg) return;
      if (h.putts != null && h.score != null) {
        puttsLogged += 1;
        if (h.putts >= 3) threePutts += 1;
      }
      if (h.firstPuttBreak === 'high') highMiss += 1;
      else if (h.firstPuttBreak === 'low') lowMiss += 1;
      if (h.score == null || !h.approach || h.approach === 'green') return;
      scrambleOpps += 1;
      const saved = h.score <= holeCfg.par;
      if (saved) scrambleMade += 1;
      if (h.shortSided) { ssOpps += 1; if (saved) ssMade += 1; }
      else { nonSsOpps += 1; if (saved) nonSsMade += 1; }
      if (h.approachTrouble === 'bunker') { sandOpps += 1; if (saved) sandMade += 1; }
    });
  });
  const scramblePct = scrambleOpps ? Math.round((scrambleMade / scrambleOpps) * 100) : null;
  const threePuttPct = puttsLogged ? Math.round((threePutts / puttsLogged) * 100) : null;
  const sandSavePct = sandOpps ? Math.round((sandMade / sandOpps) * 100) : null;
  const ssScramblePct = ssOpps ? Math.round((ssMade / ssOpps) * 100) : null;
  const nonSsScramblePct = nonSsOpps ? Math.round((nonSsMade / nonSsOpps) * 100) : null;
  const totalBreakMisses = highMiss + lowMiss;
  let breakInsight = null;
  if (totalBreakMisses >= 3) {
    if (highMiss > lowMiss * 1.5) breakInsight = `You miss high side ${highMiss} times vs low side ${lowMiss} — likely over-reading the break.`;
    else if (lowMiss > highMiss * 1.5) breakInsight = `You miss low side ${lowMiss} times vs high side ${highMiss} — likely under-reading the break.`;
    else breakInsight = `High side ${highMiss} · Low side ${lowMiss} — no strong read pattern yet.`;
  }

  const avg = arr => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length) : 0;
  const avgToPar = avg(scoreTrend.map(s => s.toPar));
  const avgFw = avg(fgTrend.map(s => s.fairwayPct));
  const avgGir = avg(fgTrend.map(s => s.girPct));
  const avgPutts = avg(puttsTrend.map(s => s.putts));
  const avgPenalties = avg(penaltyTrend.map(s => s.penalties));

  const holeStats = aggregateHoleStats(allRounds, holesConfig).sort((a, b) => a.number - b.number);
  const troubleHoles = [...holeStats].filter(h => h.rounds > 0).sort((a, b) => b.avgToPar - a.avgToPar).slice(0, 3);

  return (
    <div>
      <TopBar title="Journal & Stats" onBack={onBack} />

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 10, marginBottom: 12 }}>
        <StatCard label="Rounds Logged" value={allRounds.length} />
        <StatCard label="Avg Score" value={toParStr(Math.round(avgToPar * 10) / 10)} />
        <StatCard label="Avg Putts" value={avgPutts.toFixed(1)} />
        <StatCard label="Avg Fairways" value={`${Math.round(avgFw)}%`} />
        <StatCard label="Avg GIR" value={`${Math.round(avgGir)}%`} />
        <StatCard label="Scrambling" value={scramblePct != null ? `${scramblePct}%` : '—'} />
        <StatCard label="3-Putt Rate" value={threePuttPct != null ? `${threePuttPct}%` : '—'} />
        <StatCard label="Sand Save %" value={sandSavePct != null ? `${sandSavePct}%` : '—'} />
        <StatCard label="Avg Penalties" value={avgPenalties.toFixed(1)} />
      </div>

      {(ssScramblePct != null || nonSsScramblePct != null) && (
        <div style={{ background: C.neutralBg, borderRadius: 12, padding: '10px 14px', marginBottom: 12, fontSize: 12.5, color: C.ink }}>
          <b>Short-sided misses</b> save par {ssScramblePct != null ? `${ssScramblePct}%` : '—'} of the time, vs {nonSsScramblePct != null ? `${nonSsScramblePct}%` : '—'} when you've got green to work with.
        </div>
      )}

      {breakInsight && (
        <div style={{ background: C.neutralBg, borderRadius: 12, padding: '10px 14px', marginBottom: 24, fontSize: 12.5, color: C.ink }}>
          <b>Putt break read:</b> {breakInsight}
        </div>
      )}

      <Section title="Penalties per Round (Water + O.B.)">
        <ChartCard>
          <ResponsiveContainer width="100%" height={160}>
            <BarChart data={penaltyTrend}>
              <CartesianGrid stroke={C.line} vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize: 10, fill: C.inkSoft }} />
              <YAxis tick={{ fontSize: 10, fill: C.inkSoft }} allowDecimals={false} />
              <Tooltip />
              <Bar dataKey="penalties" fill={C.water} radius={[6, 6, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      </Section>

      <Section title="Score vs Par by Round">
        <ChartCard>
          <ResponsiveContainer width="100%" height={190}>
            <LineChart data={scoreTrend}>
              <CartesianGrid stroke={C.line} vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize: 10, fill: C.inkSoft }} />
              <YAxis tick={{ fontSize: 10, fill: C.inkSoft }} />
              <Tooltip formatter={(v, n) => n === 'toPar' ? toParStr(v) : v} />
              <Line type="monotone" dataKey="toPar" stroke={C.pine} strokeWidth={3} dot={{ r: 4 }} />
            </LineChart>
          </ResponsiveContainer>
        </ChartCard>
      </Section>

      <Section title="Fairways Hit % & GIR % by Round">
        <ChartCard>
          <ResponsiveContainer width="100%" height={190}>
            <BarChart data={fgTrend}>
              <CartesianGrid stroke={C.line} vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize: 10, fill: C.inkSoft }} />
              <YAxis tick={{ fontSize: 10, fill: C.inkSoft }} />
              <Tooltip />
              <Bar dataKey="fairwayPct" name="Fairways %" fill={C.hit} radius={[6, 6, 0, 0]} />
              <Bar dataKey="girPct" name="GIR %" fill={C.neutral} radius={[6, 6, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>
      </Section>

      <Section title="Putts per Round">
        <ChartCard>
          <ResponsiveContainer width="100%" height={170}>
            <LineChart data={puttsTrend}>
              <CartesianGrid stroke={C.line} vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize: 10, fill: C.inkSoft }} />
              <YAxis tick={{ fontSize: 10, fill: C.inkSoft }} />
              <Tooltip />
              <Line type="monotone" dataKey="putts" stroke={C.neutral} strokeWidth={3} dot={{ r: 4 }} />
            </LineChart>
          </ResponsiveContainer>
        </ChartCard>
        <div style={{ textAlign: 'center', fontSize: 13, color: C.inkSoft, marginTop: 6 }}>Average: {avgPutts.toFixed(1)} putts/round</div>
      </Section>

      <Section title="Trouble Holes (avg score vs par)">
        <ChartCard>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={holeStats}>
              <CartesianGrid stroke={C.line} vertical={false} />
              <XAxis dataKey="number" tick={{ fontSize: 10, fill: C.inkSoft }} />
              <YAxis tick={{ fontSize: 10, fill: C.inkSoft }} />
              <Tooltip formatter={(v) => toParStr(Math.round(v * 10) / 10)} labelFormatter={(l) => 'Hole ' + l} />
              <Bar dataKey="avgToPar" radius={[6, 6, 0, 0]}>
                {holeStats.map((h, i) => (
                  <Cell key={i} fill={h.avgToPar > 0.4 ? C.miss : h.avgToPar < -0.1 ? C.hit : C.neutral} />
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </ChartCard>

        {troubleHoles.length > 0 && (
          <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column', gap: 8 }}>
            {troubleHoles.map(h => (
              <div key={h.number} style={{ background: C.missBg, borderRadius: 12, padding: '10px 14px' }}>
                <div style={{ fontWeight: 700, color: C.ink, fontSize: 14 }}>
                  Hole {h.number} (Par {h.par}) — averaging {toParStr(Math.round(h.avgToPar * 10) / 10)}
                </div>
                {h.dominantMiss && (
                  <div style={{ fontSize: 13, color: C.inkSoft, marginTop: 2 }}>
                    Pattern: {h.dominantMiss.label} ({h.dominantMiss.count}x)
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </Section>

      <Section title="Round History">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {[...allRounds].reverse().map(r => {
            const holesArr = Object.values(r.holes || {});
            const score = holesArr.reduce((s, h) => s + (h.score || 0), 0);
            const putts = holesArr.reduce((s, h) => s + (h.putts || 0), 0);
            return (
              <div key={r.id} style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, padding: '10px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 14, color: C.ink }}>{fmtDate(r.date)}</div>
                  <div style={{ fontSize: 12, color: C.inkSoft }}>{holesArr.length} holes · {putts} putts</div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ fontFamily: 'Oswald, sans-serif', fontSize: 20, color: C.pine }}>{score} ({toParStr(score - roundPar(r, holesConfig))})</div>
                  {pendingDeleteId === r.id ? (
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button onClick={() => { onDeleteRound(r.id); setPendingDeleteId(null); }} style={{ background: C.miss, border: 'none', color: '#fff', fontSize: 11, fontWeight: 700, padding: '6px 8px', borderRadius: 8 }}>Delete</button>
                      <button onClick={() => setPendingDeleteId(null)} style={{ background: '#fff', border: `1px solid ${C.line}`, color: C.inkSoft, fontSize: 11, fontWeight: 700, padding: '6px 8px', borderRadius: 8 }}>Cancel</button>
                    </div>
                  ) : (
                    <button onClick={() => setPendingDeleteId(r.id)} style={{ background: 'none', border: 'none', color: C.miss }}><Trash2 size={18} /></button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </Section>
    </div>
  );
}

function StatCard({ label, value }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 14, padding: '14px 12px', textAlign: 'center' }}>
      <div style={{ fontFamily: 'Oswald, sans-serif', fontSize: 26, color: C.pine, fontWeight: 600 }}>{value}</div>
      <div style={{ fontSize: 11, color: C.inkSoft, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, marginTop: 2 }}>{label}</div>
    </div>
  );
}
function ChartCard({ children }) {
  return <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 16, padding: '12px 8px' }}>{children}</div>;
}

// ---------- App ----------
export default function App() {
  const [view, setView] = useState('loading');
  const [holesConfig, setHolesConfig] = useState(null);
  const [roundsIndex, setRoundsIndex] = useState([]);
  const [activeRoundId, setActiveRoundId] = useState(null);
  const [activeRound, setActiveRound] = useState(null);
  const [currentHole, setCurrentHole] = useState(1);

  useEffect(() => { init(); }, []);

  async function init() {
    let cfg = await storageGet('course-holes-v2');
    if (!cfg) {
      cfg = HOLES_DATA;
      await storageSet('course-holes-v2', cfg);
    }
    setHolesConfig(cfg);
    let idx = await storageGet('rounds-index');
    if (!idx) idx = [];
    setRoundsIndex(idx);
    let activeId = await storageGet('active-round-id');
    if (activeId) {
      const r = await storageGet('round-' + activeId);
      if (r) {
        setActiveRoundId(activeId);
        setActiveRound(r);
        let resumeHole = 1;
        for (let h = 1; h <= cfg.length; h++) { if (r.holes[h]) resumeHole = Math.min(h + 1, cfg.length); }
        setCurrentHole(resumeHole);
      } else {
        await storageDelete('active-round-id');
      }
    }
    setView('home');
  }

  async function startNewRound() {
    const id = uid();
    const round = { id, date: new Date().toISOString(), holes: {} };
    await storageSet('round-' + id, round);
    await storageSet('active-round-id', id);
    setActiveRoundId(id);
    setActiveRound(round);
    setCurrentHole(1);
    setView('play');
  }

  async function abandonActiveRound() {
    if (!activeRoundId) return;
    await storageDelete('round-' + activeRoundId);
    await storageDelete('active-round-id');
    setActiveRoundId(null);
    setActiveRound(null);
    setView('home');
  }

  const handleSaveAndGo = useCallback(async (holeNumber, data, dest) => {
    const updated = { ...activeRound, holes: { ...activeRound.holes, [holeNumber]: data } };
    setActiveRound(updated);
    await storageSet('round-' + activeRoundId, updated);
    if (dest === 'finish') {
      await finishRound(updated);
    } else {
      setCurrentHole(dest);
    }
  }, [activeRound, activeRoundId, holesConfig, roundsIndex]);

  async function finishRound(round) {
    const totalPar = roundPar(round, holesConfig);
    const holesArr = Object.values(round.holes);
    const totalScore = holesArr.reduce((s, h) => s + (h.score || 0), 0);
    const summary = { id: round.id, date: round.date, totalScore, totalPar, holesPlayed: holesArr.length };
    const newIndex = [...roundsIndex.filter(r => r.id !== round.id), summary];
    setRoundsIndex(newIndex);
    await storageSet('rounds-index', newIndex);
    await storageDelete('active-round-id');
    setActiveRoundId(null);
    setActiveRound(null);
    setView('home');
  }

  async function finishNow() {
    if (!activeRound) return;
    await finishRound(activeRound);
  }

  async function handleDeleteRound(id) {
    const newIndex = roundsIndex.filter(r => r.id !== id);
    setRoundsIndex(newIndex);
    await storageSet('rounds-index', newIndex);
    await storageDelete('round-' + id);
  }

  async function handleSaveCourse(newConfig) {
    setHolesConfig(newConfig);
    await storageSet('course-holes-v2', newConfig);
    setView('home');
  }

  if (view === 'loading' || !holesConfig) {
    return (
      <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Loader2 className="animate-spin" color={C.pine} size={32} />
      </div>
    );
  }

  return (
    <div style={{ minHeight: '100vh', background: C.bg, fontFamily: 'Inter, sans-serif' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
        button { cursor: pointer; font-family: inherit; }
      `}</style>

      <div style={{ maxWidth: 480, margin: '0 auto', padding: '12px 14px 24px' }}>

        {view === 'home' && (
          <Home
            activeRound={activeRound}
            currentHole={currentHole}
            roundsCount={roundsIndex.length}
            onStart={startNewRound}
            onResume={() => setView('play')}
            onAbandon={abandonActiveRound}
            onFinishNow={finishNow}
            onStats={() => setView('stats')}
            onSettings={() => setView('settings')}
          />
        )}

        {view === 'play' && activeRound && (
          <div>
            <TopBar title={`Hole ${currentHole} of ${holesConfig.length}`} onBack={() => setView('home')} />
            <FlagStrip
              holesConfig={holesConfig}
              completedMap={activeRound.holes}
              currentHole={currentHole}
              onJump={(n) => setCurrentHole(n)}
            />
            <HoleEntry
              key={currentHole}
              hole={holesConfig[currentHole - 1]}
              initialData={activeRound.holes[currentHole]}
              holesTotal={holesConfig.length}
              onSaveAndGo={(data, dest) => handleSaveAndGo(currentHole, data, dest)}
            />
          </div>
        )}

        {view === 'settings' && (
          <CourseSettings holesConfig={holesConfig} onSave={handleSaveCourse} onBack={() => setView('home')} />
        )}

        {view === 'stats' && (
          <StatsView roundsIndex={roundsIndex} holesConfig={holesConfig} onBack={() => setView('home')} onDeleteRound={handleDeleteRound} />
        )}
      </div>
    </div>
  );
}

function Home({ activeRound, currentHole, roundsCount, onStart, onResume, onAbandon, onFinishNow, onStats, onSettings }) {
  const [showMenu, setShowMenu] = useState(false);
  const [confirmAction, setConfirmAction] = useState(null); // null | 'finish' | 'discard'
  const holesLogged = activeRound ? Object.keys(activeRound.holes || {}).length : 0;

  const linkStyle = { width: '100%', background: 'none', border: 'none', fontSize: 13, fontWeight: 600, padding: '6px 0' };

  return (
    <div>
      <div style={{ textAlign: 'center', margin: '18px 0 30px' }}>
        <Flag size={40} color={C.pine} style={{ marginBottom: 8 }} />
        <div style={{ fontFamily: 'Oswald, sans-serif', fontSize: 28, fontWeight: 600, color: C.ink, letterSpacing: 0.5 }}>BUCKHORN SPRINGS</div>
        <div style={{ fontSize: 14, color: C.inkSoft, fontWeight: 600, letterSpacing: 1 }}>SHOT JOURNAL</div>
      </div>

      {activeRound && (
        <div style={{ marginBottom: 16 }}>
          <BigButton onClick={onResume}><Play size={20} /> Resume Round — Hole {currentHole}</BigButton>

          {!showMenu ? (
            <button onClick={() => setShowMenu(true)} style={{ ...linkStyle, color: C.inkSoft, marginTop: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
              <MoreHorizontal size={15} /> Round options
            </button>
          ) : (
            <div style={{ marginTop: 8, background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, padding: 10 }}>

              {confirmAction === 'finish' ? (
                <div style={{ display: 'flex', gap: 8, marginBottom: 6 }}>
                  <button onClick={onFinishNow} style={{ flex: 1, background: C.pine, border: 'none', color: '#fff', fontSize: 12.5, fontWeight: 700, padding: '9px', borderRadius: 9 }}>
                    Yes, finish now
                  </button>
                  <button onClick={() => setConfirmAction(null)} style={{ flex: 1, background: '#fff', border: `1.5px solid ${C.line}`, color: C.inkSoft, fontSize: 12.5, fontWeight: 700, padding: '9px', borderRadius: 9 }}>
                    Cancel
                  </button>
                </div>
              ) : (
                <button
                  onClick={() => holesLogged > 0 && setConfirmAction('finish')}
                  disabled={holesLogged === 0}
                  style={{ ...linkStyle, color: holesLogged > 0 ? C.pine : C.line, textAlign: 'left' }}
                >
                  Finish Round Now {holesLogged > 0 ? `(${holesLogged} hole${holesLogged === 1 ? '' : 's'} logged)` : '(log at least 1 hole first)'}
                </button>
              )}

              {confirmAction === 'discard' ? (
                <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
                  <button onClick={onAbandon} style={{ flex: 1, background: C.miss, border: 'none', color: '#fff', fontSize: 12.5, fontWeight: 700, padding: '9px', borderRadius: 9 }}>
                    Yes, discard it
                  </button>
                  <button onClick={() => setConfirmAction(null)} style={{ flex: 1, background: '#fff', border: `1.5px solid ${C.line}`, color: C.inkSoft, fontSize: 12.5, fontWeight: 700, padding: '9px', borderRadius: 9 }}>
                    Cancel
                  </button>
                </div>
              ) : (
                <button onClick={() => setConfirmAction('discard')} style={{ ...linkStyle, color: C.miss, textAlign: 'left' }}>
                  Discard This Round
                </button>
              )}
            </div>
          )}
        </div>
      )}

      {!activeRound && (
        <div style={{ marginBottom: 16 }}>
          <BigButton onClick={onStart}><Play size={20} /> Start New Round</BigButton>
        </div>
      )}

      <div style={{ marginBottom: 16 }}>
        <BigButton onClick={onStats} tone="ghost"><BarChart3 size={20} /> Journal & Stats ({roundsCount})</BigButton>
      </div>

      <button onClick={onSettings} style={{ width: '100%', background: 'none', border: 'none', color: C.inkSoft, fontSize: 14, marginTop: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, fontWeight: 600 }}>
        <Settings size={16} /> Edit Course Pars
      </button>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>

<script type="module">
function showError(title, detail) {
  var status = document.getElementById('boot-status');
  var err = document.getElementById('boot-error');
  if (status) status.textContent = title;
  if (err) {
    err.style.display = 'block';
    err.textContent = detail;
  }
  console.error(title, detail);
}

window.addEventListener('unhandledrejection', function (e) {
  showError('Failed to load the app.', String((e.reason && (e.reason.stack || e.reason.message)) || e.reason));
});
window.addEventListener('error', function (e) {
  showError('Failed to load the app.', String((e.error && e.error.stack) || e.message));
});

try {
  var source = document.getElementById('app-source').textContent;
  var compiled = Babel.transform(source, {
    presets: ['react'],
    sourceType: 'module',
    filename: 'app.jsx',
  }).code;
  var blob = new Blob([compiled], { type: 'text/javascript' });
  var url = URL.createObjectURL(blob);
  import(url).catch(function (err) {
    showError('The app failed to start.', String((err && err.stack) || err));
  });
} catch (err) {
  showError('The app failed to compile.', String((err && err.stack) || err));
}
</script>

</body>
</html>
